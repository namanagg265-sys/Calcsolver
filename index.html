<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CalcSolver Smart Games</title>
    <style>
        :root { --bg:#f7f9fc; --panel:#ffffff; --accent:#00c2cb; }
        body { background:var(--bg); font-family: sans-serif; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
        
        /* Calculator UI */
        .wrapper { width: 95%; max-width: 360px; background: var(--panel); padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #display { width:100%; height:80px; border:none; text-align:right; font-size:3rem; outline:none; margin-bottom:25px; }
        .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
        button { aspect-ratio:1/1; border:none; background:transparent; font-size:1.6rem; cursor:pointer; }
        .op { color: var(--accent); font-weight: bold; }

        /* Game Overlay */
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; flex-direction:column; align-items:center; color:white; padding:10px; }
        .game-nav { display:flex; gap:10px; margin: 15px 0; }
        .game-nav button { aspect-ratio:unset; background:#333; color:white; padding:8px 15px; border-radius:8px; font-size:0.9rem; }
        
        #gameArea { position: relative; width: 90vw; height: 90vw; max-width: 340px; max-height: 340px; }
        canvas { background:#111; border:2px solid #333; width: 100%; height: 100%; display:block; }
        
        /* Tic Tac Toe Grid */
        #tttGrid { display:none; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; height: 100%; }
        #tttGrid div { background:#222; display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:bold; border-radius:10px; }

        .score-board { font-size: 1.2rem; margin: 10px 0; color: var(--accent); }
        .exit-btn { position:absolute; top:10px; right:10px; background:#ff4444; border:none; color:white; padding:8px 15px; border-radius:5px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <span style="font-weight:bold; color:var(--accent);">CalcSolver</span>
        <input type="checkbox" id="modeSwitch">
    </div>
    <input id="display" placeholder="0" readonly>
    <div class="grid">
        <button onclick="clearDisplay()">C</button><button onclick="press('%')">%</button><button onclick="back()">тМл</button><button class="op" onclick="press('/')">├╖</button>
        <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button class="op" onclick="press('*')">├Ч</button>
        <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button class="op" onclick="press('-')">тИТ</button>
        <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button class="op" onclick="press('+')">+</button>
        <button onclick="press('00')">00</button><button onclick="press('0')">0</button><button onclick="press('.')">.</button><button class="op" onclick="solve()">=</button>
    </div>
</div>

<div id="overlay">
    <button class="exit-btn" onclick="location.reload()">EXIT</button>
    <div class="game-nav">
        <button onclick="initTTT()">TTT тнХ</button>
        <button onclick="initChess()">Chess тЩЪ</button>
    </div>
    <div class="score-board" id="statLine">Score - X: 0 | O: 0</div>
    <div id="gameArea">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="tttGrid"></div>
    </div>
</div>

<script>
let expr = "";
const display = document.getElementById('display');
const overlay = document.getElementById('overlay');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const tttGrid = document.getElementById('tttGrid');

function press(v) { 
    expr += v; display.value = expr; 
    if(document.getElementById('modeSwitch').checked && expr.endsWith("0000")) {
        expr = ""; display.value = ""; overlay.style.display = "flex"; initTTT();
    }
}
function solve() { try { expr = eval(expr).toString(); display.value = expr; } catch { display.value = "Error"; expr = ""; } }
function clearDisplay() { expr = ""; display.value = ""; }
function back() { expr = expr.slice(0,-1); display.value = expr; }

// --- TIC TAC TOE LOGIC ---
let tttScores = {X:0, O:0}, tttBoard = Array(9).fill(""), tttTurn = "X";
function initTTT() {
    canvas.style.display = "none"; tttGrid.style.display = "grid";
    renderTTT(); updateTTTScore();
}
function renderTTT() {
    tttGrid.innerHTML = "";
    tttBoard.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.innerText = val;
        cell.style.color = val === "X" ? "#ff6b6b" : "#00c2cb";
        cell.onclick = () => { if(!tttBoard[i]) { tttBoard[i] = tttTurn; tttTurn = tttTurn === "X" ? "O" : "X"; checkTTT(); renderTTT(); } };
        tttGrid.appendChild(cell);
    });
}
function checkTTT() {
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let w of wins) {
        if(tttBoard[w[0]] && tttBoard[w[0]] === tttBoard[w[1]] && tttBoard[w[0]] === tttBoard[w[2]]) {
            tttScores[tttBoard[w[0]]]++; resetTTT(); return;
        }
    }
    if(!tttBoard.includes("")) resetTTT();
}
function resetTTT() { tttBoard = Array(9).fill(""); renderTTT(); updateTTTScore(); }
function updateTTTScore() { document.getElementById('statLine').innerText = `Score - X: ${tttScores.X} | O: ${tttScores.O}`; }

// --- CHESS LOGIC ---
let chessBoard = [
    ['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],['','','','','','','',''],
    ['','','','','','','',''],['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']
];
let selected = null;
const symbols = { k:'тЩЪ', q:'тЩЫ', r:'тЩЬ', b:'тЩЭ', n:'тЩЮ', p:'тЩЯ', K:'тЩФ', Q:'тЩХ', R:'тЩЦ', B:'тЩЧ', N:'тЩШ', P:'тЩЩ' };

function initChess() {
    canvas.style.display = "block"; tttGrid.style.display = "none";
    document.getElementById('statLine').innerText = "Chess Mode: Tap to Move";
    drawChess();
}

function drawChess() {
    ctx.clearRect(0,0,400,400);
    for(let r=0; r<8; r++) {
        for(let c=0; c<8; c++) {
            ctx.fillStyle = (r+c)%2===0 ? "#eee" : "#888";
            if(selected && selected.r === r && selected.c === c) ctx.fillStyle = "#ffeb3b";
            ctx.fillRect(c*50, r*50, 50, 50);
            if(chessBoard[r][c]) {
                ctx.fillStyle = "#000"; ctx.font = "40px Arial";
                ctx.fillText(symbols[chessBoard[r][c]], c*50+5, r*50+42);
            }
        }
    }
}

canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const c = Math.floor((e.clientX - rect.left) / (rect.width / 8));
    const r = Math.floor((e.clientY - rect.top) / (rect.height / 8));
    
    if(selected) {
        // Move or Capture
        let target = chessBoard[r][c];
        chessBoard[r][c] = chessBoard[selected.r][selected.c];
        chessBoard[selected.r][selected.c] = '';
        
        // Pawn Promotion (Queen banana)
        if(chessBoard[r][c] === 'P' && r === 0) chessBoard[r][c] = 'Q';
        if(chessBoard[r][c] === 'p' && r === 7) chessBoard[r][c] = 'q';
        
        selected = null;
    } else if(chessBoard[r][c]) {
        selected = {r, c};
    }
    drawChess();
};
</script>
</body>
</html>
