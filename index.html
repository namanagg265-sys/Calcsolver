<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CalcSolver Pro</title>
    <style>
        :root { --bg:#1a1a1c; --panel:#2d2d30; --accent:#4d90fe; --btn:#3e3e42; }
        body { background:var(--bg); color:white; font-family: sans-serif; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
        
        /* Main Calculator Container */
        .wrapper { width: 95%; max-width: 360px; background: var(--panel); padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        /* Header & Code Mode Switch */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .mode-label { font-size: 0.8rem; color: #aaa; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        #display { width:100%; height:70px; background:transparent; border:none; color:white; text-align:right; font-size:2.8rem; outline:none; margin-bottom:20px; padding: 0 10px; box-sizing: border-box;}
        
        .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
        button { aspect-ratio: 1/1; border:none; border-radius:50%; background:var(--btn); color:white; font-size:1.3rem; cursor:pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        button:active { background:#555; transform:scale(0.9); }
        .op { background:#505050; color:var(--accent); font-weight: bold; }
        .eq { background:var(--accent); color:white; font-weight:bold; }
        .ac { color: #f28b82; }

        /* Full Screen Overlay */
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 1000; flex-direction: column; align-items: center; padding-top: 10px; }
        .exit-btn { align-self: flex-end; margin-right: 20px; background: #ea4335; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        
        canvas { background:#111; border:1px solid #333; margin: 10px 0; border-radius: 10px; width: 90vw; height: 90vw; max-width: 300px; max-height: 300px;}
        .game-controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; margin-top: 10px; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 15px; background: #333; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <span style="font-weight: bold; color: var(--accent);">CalcSolver</span>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span class="mode-label">Code Mode</span>
            <label class="switch">
                <input type="checkbox" id="modeSwitch">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    
    <input id="display" placeholder="0" readonly>
    
    <div class="grid">
        <button class="op ac" onclick="clearDisplay()">AC</button>
        <button class="op" onclick="back()">DEL</button>
        <button class="op" onclick="calcPercent()">%</button>
        <button class="op" onclick="press('/')">÷</button>
        
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="op" onclick="press('*')">×</button>
        
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="op" onclick="press('-')">−</button>
        
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button class="op" onclick="press('+')">+</button>
        
        <button onclick="press('0')" style="grid-column: span 2; aspect-ratio: unset; border-radius: 30px;">0</button>
        <button onclick="press('.')">.</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<div id="overlay">
    <button class="exit-btn" onclick="closeGames()">EXIT</button>
    <div id="scoreBox" style="font-size: 1.2rem; margin: 5px;">Score: 0</div>
    <div class="game-nav" style="margin-bottom: 10px;">
        <button class="op" onclick="startSnake()" style="display:inline; padding: 10px; border-radius: 5px; aspect-ratio: unset;">Snake</button>
        <button class="op" onclick="startDino()" style="display:inline; padding: 10px; border-radius: 5px; aspect-ratio: unset;">Dino</button>
    </div>
    
    <canvas id="canvas" width="300" height="300"></canvas>
    
    <div class="game-controls">
        <div></div><button class="ctrl-btn" onclick="move('up')">⬆️</button><div></div>
        <button class="ctrl-btn" onclick="move('left')">⬅️</button>
        <button class="ctrl-btn" onclick="move('down')">⬇️</button>
        <button class="ctrl-btn" onclick="move('right')">➡️</button>
    </div>
</div>

<script>
let expr="", secret="0000", loop, ctx, currentScore=0;
const canvas = document.getElementById("canvas");
ctx = canvas.getContext("2d");

function press(v){
    expr+=v; document.getElementById('display').value=expr;
    let isModeOn = document.getElementById('modeSwitch').checked;
    if(isModeOn && expr.endsWith(secret)){
        clearDisplay();
        document.getElementById('overlay').style.display="flex";
    }
}

function solve(){
    try {
        let res = eval(expr);
        document.getElementById('display').value = res;
        expr = res.toString();
    } catch { document.getElementById('display').value = "Error"; expr = ""; }
}

function clearDisplay(){ expr=""; document.getElementById('display').value=""; }
function back(){ expr=expr.slice(0,-1); document.getElementById('display').value=expr; }
function calcPercent(){ document.getElementById('display').value=(eval(expr)||0)/100; expr=""; }

function closeGames(){ 
    document.getElementById('overlay').style.display="none"; 
    clearInterval(loop);
}

function updateScore(){ document.getElementById('scoreBox').innerText = "Score: " + currentScore; }

// --- SNAKE ---
function startSnake(){
    clearInterval(loop); currentScore=0; updateScore();
    let snake=[{x:10,y:10}], food={x:5,y:5}, dx=1, dy=0;
    loop=setInterval(()=>{
        ctx.fillStyle="black"; ctx.fillRect(0,0,300,300);
        ctx.fillStyle="red"; ctx.fillRect(food.x*15, food.y*15, 14, 14);
        ctx.fillStyle="lime"; snake.forEach(s=>ctx.fillRect(s.x*15,s.y*15,14,14));
        let head={x:snake[0].x+dx,y:snake[0].y+dy};
        if(head.x<0||head.y<0||head.x>=20||head.y>=20){ alert("Game Over"); clearInterval(loop); return; }
        snake.unshift(head);
        if(head.x===food.x && head.y===food.y){
            currentScore++; updateScore();
            food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
        } else snake.pop();
    }, 150);
    window.move=(d)=>{ if(d=="up"&&dy==0){dx=0;dy=-1} if(d=="down"&&dy==0){dx=0;dy=1} if(d=="left"&&dx==0){dx=-1;dy=0} if(d=="right"&&dx==0){dx=1;dy=0} };
}

// --- DINO ---
function startDino(){
    clearInterval(loop); currentScore=0; updateScore();
    let y=250, jump=0, x=300;
    loop=setInterval(()=>{
        ctx.fillStyle="black"; ctx.fillRect(0,0,300,300);
        if(jump>0){ y-=5; jump--; } else if(y<250){ y+=5; }
        ctx.fillStyle="lime"; ctx.fillRect(40,y,20,20);
        ctx.fillStyle="red"; ctx.fillRect(x,250,15,20);
        x-=8;
        if(x<0){ x=300; currentScore++; updateScore(); }
        if(x<60 && x>20 && y>230){ alert("Crash!"); clearInterval(loop); }
    }, 40);
    window.move=(d)=>{ if(d=="up" && y==250) jump=25; };
}
</script>
</body>
</html>
